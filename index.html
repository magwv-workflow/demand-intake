<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Intake Form</title>
</head>
<body>

  <div id="myForm" style="max-width:480px; margin:40px auto; font-family:sans-serif;">

    <div style="margin-bottom:16px;">
      <label style="display:block; font-weight:600; margin-bottom:4px;">ID</label>
      <input type="text" id="matterId" readonly
        style="width:100%; padding:8px; background:#f0f0f0; border:1px solid #ccc; border-radius:4px; color:#555; cursor:not-allowed;"/>
    </div>

    <div style="margin-bottom:16px;">
      <label style="display:block; font-weight:600; margin-bottom:4px;">Regarding Intake</label>
      <input type="text" id="regardingIntake" readonly
        style="width:100%; padding:8px; background:#f0f0f0; border:1px solid #ccc; border-radius:4px; color:#555; cursor:not-allowed;"/>
    </div>

    <div style="margin-bottom:16px;">
      <label style="display:block; font-weight:600; margin-bottom:4px;">MAGC Matter Number <span style="color:red;">*</span></label>
      <input type="text" id="magcMatterNumber" placeholder="Enter MAGC Matter Number"
        style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;"/>
      <span id="magcError" style="color:red; font-size:13px; display:none;">MAGC Matter Number is required.</span>
    </div>

    <button onclick="submitForm()"
      style="padding:10px 24px; background:#0078d4; color:white; border:none; border-radius:4px; cursor:pointer; font-size:15px;">
      Submit
    </button>
    <p id="status" style="margin-top:12px;"></p>

  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const idValue = params.get("id");

    document.getElementById("matterId").value = idValue || "";
    document.getElementById("regardingIntake").value = params.get("regarding") || "";

    if (!idValue) {
      document.getElementById("status").style.color = "red";
      document.getElementById("status").innerText = "This form requires a valid link with an ID. Please contact your administrator.";
    }

    async function submitForm() {
      const magcValue = document.getElementById("magcMatterNumber").value.trim();
      const errorEl = document.getElementById("magcError");

      if (!idValue) {
        document.getElementById("status").style.color = "red";
        document.getElementById("status").innerText = "This form requires a valid link with an ID. Please contact your administrator.";
        return;
      }

      if (!magcValue) {
        errorEl.style.display = "block";
        return;
      }
      errorEl.style.display = "none";

      const body = {
        id: idValue,
        regarding: params.get("regarding"),
        magcMatterNumber: magcValue
      };

      try {
        const response = await fetch("https://574e6fa47883e9d9a7124939189fc1.09.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/d0d83fdbdeae4b1082b23e0bf9b3c6ec/triggers/manual/paths/invoke?api-version=1__FLOW_URL__sp=%2Ftriggers%2Fmanual%2Frun__FLOW_URL__sv=1.0__FLOW_URL__sig=bSBal1PNIbv_htJFjnFxBaF8UsKBn7mV0jRv1DUs7sE", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });

        document.getElementById("status").style.color = "green";
        document.getElementById("status").innerText =
          response.ok ? "Submitted successfully!" : "Something went wrong. Please try again.";
      } catch (err) {
        document.getElementById("status").style.color = "red";
        document.getElementById("status").innerText = "Error submitting. Please try again.";
      }
    }
  </script>

</body>
</html>
